<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk & Incident Register Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f6f9;
    }

    h2 {
        text-align: center;
        color: #2c3e50;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 12px;
        border: 1px solid #ddd;
        text-align: left;
    }

    th {
        background-color: #34495e;
        color: white;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    .high {
        color: red;
        font-weight: bold;
    }

    .medium {
        color: orange;
        font-weight: bold;
    }

    .low {
        color: green;
        font-weight: bold;
    }
</style>
</head>

<body>

<h2>Risk & Incident Register Dashboard</h2>

<div class="container">

<input type="text" id="search" onkeyup="filterTable()" placeholder="Search records...">

<table id="riskTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Risk / Incident</th>
            <th>Category</th>
            <th>Severity</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>Unencrypted EC2 Volumes</td>
            <td>Data Security</td>
            <td class="high">High</td>
            <td>Open</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Missing SLA with Vendors</td>
            <td>Third Party Risk</td>
            <td class="medium">Medium</td>
            <td>In Progress</td>
        </tr>
        <tr>
            <td>3</td>
            <td>No BitLocker Enabled</td>
            <td>Endpoint Security</td>
            <td class="high">High</td>
            <td>Open</td>
        </tr>
    </tbody>
</table>

</div>

<script>
function filterTable() {
    let input = document.getElementById("search");
    let filter = input.value.toLowerCase();
    let table = document.getElementById("riskTable");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        tr[i].style.display = "none";
        let td = tr[i].getElementsByTagName("td");
        for (let j = 0; j < td.length; j++) {
            if (td[j]) {
                if (td[j].innerText.toLowerCase().includes(filter)) {
                    tr[i].style.display = "";
                    break;
                }
            }
        }
    }
}
</script>

</body>
</html>
